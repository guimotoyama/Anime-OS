<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime OS | GLM Anime</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#CA3E47">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="Imagens/Favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Kanit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-area">
                <a href="#"><img src="imagens/Logo.svg" alt="Anime OS Logo" class="logo-img"></a>
                <p>GLM Anime Dashboard</p>
            </div>
            
            <div class="search-box">
                <input type="text" id="anime-search" placeholder="Buscar novo anime no MAL...">
                <span id="clear-search" class="clear-btn">&times;</span>
                <button id="search-btn">🔍 Buscar</button>
                <div id="search-results" class="search-results"></div>
            </div>
        </header>

        <nav class="filters">
            <div class="filter-group">
                <button class="filter-btn active" data-filter="watching">Assistindo</button>
                <button class="filter-btn" data-filter="completed">Concluídos</button>
                <button class="filter-btn" data-filter="planned">Planejados</button>
            </div>
            <div class="sort-category-group">
                <select id="sort-select" class="premium-select">
                    <option value="alpha">A-Z</option>
                    <option value="recent">Mais Recentes</option>
                </select>
                <select id="genre-select" class="premium-select">
                    <option value="all">Todas as Categorias</option>
                </select>
            </div>
        </nav>

        <main id="main-content">
            <div id="anime-grid" class="anime-grid">
                <!-- Cards via JS -->
            </div>
            <div id="anime-detail" class="anime-detail" style="display: none;">
                <!-- Detalhes via JS -->
            </div>
        </main>
    </div>

    <!-- Global UI Modal -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modal-title">Aviso</h2>
                <button id="modal-close-x" class="close-x">&times;</button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Conteúdo dinâmico -->
            </div>
            <div id="modal-footer" class="modal-footer">
                <!-- Botões dinâmicos -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered!', reg))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
